<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a56db">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<title>盐城供电 · 宣传工作周报看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #1a56db; --primary-light: #e8f0fe; --primary-dark: #1e40af;
  --success: #0e9f6e; --warning: #e3a008; --danger: #e02424;
  --text: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af;
  --bg: #f3f4f6; --card: #fff; --border: #e5e7eb;
  --rank1: #f59e0b; --rank2: #94a3b8; --rank3: #cd7c3b;
  --gradient: linear-gradient(135deg, #1a56db 0%, #1e40af 100%);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; overflow-x: hidden;
  min-height: 100vh;
}

/* ========== PASSWORD GATE ========== */
.gate {
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  background: var(--gradient); padding: 20px;
}
.gate-card {
  background: #fff; border-radius: 16px; padding: 36px 24px;
  max-width: 380px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.15);
  text-align: center;
}
.gate-icon { font-size: 48px; margin-bottom: 12px; }
.gate-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.gate-sub  { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
.gate-input {
  width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px;
  font-size: 16px; text-align: center; outline: none; transition: border-color .2s;
  letter-spacing: 2px;
}
.gate-input:focus { border-color: var(--primary); }
.gate-btn {
  width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 10px;
  background: var(--gradient); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity .2s;
}
.gate-btn:active { opacity: .85; }
.gate-error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }
.gate-hint { font-size: 11px; color: var(--text-muted); margin-top: 16px; }

/* ========== APP SHELL ========== */
.app { display: block; }

.header {
  background: var(--gradient); color: #fff; padding: 14px 16px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(26,86,219,.25);
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 17px; font-weight: 700; }
.header-subtitle { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 2px; }
.header-action { font-size: 22px; cursor: pointer; opacity: .8; background: none; border: none; color: #fff; }

/* ========== NAVIGATION HUB ========== */
.hub { padding: 12px 14px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.hub-card {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .15s, box-shadow .15s;
  display: flex; align-items: center; gap: 12px; border-left: 4px solid transparent;
  text-decoration: none; color: inherit;
}
.hub-card:active { transform: scale(.97); }
.hub-card.weekly { border-left-color: var(--primary); }
.hub-card.monthly { border-left-color: var(--warning); }
.hub-card.quarterly { border-left-color: var(--success); }
.hub-card.unit { border-left-color: #8b5cf6; }

.hub-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.hub-card.weekly .hub-icon { background: var(--primary-light); }
.hub-card.monthly .hub-icon { background: #fef3c7; }
.hub-card.quarterly .hub-icon { background: #d1fae5; }
.hub-card.unit .hub-icon { background: #ede9fe; }

.hub-info { flex: 1; min-width: 0; }
.hub-label { font-size: 14px; font-weight: 600; color: var(--text); }
.hub-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ========== MAIN NAV TABS ========== */
.main-nav { display: flex; gap: 6px; padding: 10px 14px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 99; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.main-nav::-webkit-scrollbar { display: none; }
.nav-btn { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; background: var(--bg); color: var(--text-secondary); white-space: nowrap; }
.nav-btn.active { background: var(--primary); color: #fff; }

/* ========== UNIT PICKER ========== */
.unit-picker { padding: 12px 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.unit-chip {
  padding: 10px 6px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card);
  font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all .15s;
  color: var(--text);
}
.unit-chip:active { transform: scale(.95); }
.unit-chip.sel { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

.content { padding: 12px 14px; max-width: 900px; margin: 0 auto; }

/* ========== WEEK CARDS ========== */
.weeks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.week-card {
  background: var(--card); border-radius: var(--radius); padding: 14px 12px;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .15s; text-align: center;
  border-top: 3px solid var(--border);
}
.week-card:active { transform: scale(.96); }
.week-card.hot { border-top-color: var(--danger); }
.week-card.warm { border-top-color: var(--warning); }
.week-card.cool { border-top-color: var(--primary); }
.week-num { font-size: 16px; font-weight: 700; }
.week-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.week-top { font-size: 11px; font-weight: 600; margin-top: 6px; }

/* ========== MONTH CARDS ========== */
.month-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.month-card {
  background: var(--card); border-radius: var(--radius); padding: 16px 14px;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .15s;
  border-left: 5px solid var(--warning);
}
.month-card:active { transform: scale(.97); }
.month-name { font-size: 17px; font-weight: 700; }
.month-weeks { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.month-leader { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

/* ========== QUARTER CARDS ========== */
.quarter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.quarter-card {
  background: var(--card); border-radius: var(--radius); padding: 16px 14px;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .15s;
  border-left: 5px solid var(--success);
}
.quarter-card:active { transform: scale(.97); }
.quarter-name { font-size: 17px; font-weight: 700; }
.quarter-weeks { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.quarter-leader { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

/* ========== DETAIL VIEW ========== */
.back-bar {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card);
  border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 99; cursor: pointer;
  transition: background .15s;
}
.back-bar:hover { background: var(--bg); }
.back-bar:active { opacity: .7; }
.back-arrow { font-size: 20px; }
.back-title { font-size: 15px; font-weight: 700; }
.back-sub { font-size: 11px; color: var(--text-muted); }

/* 返回首页版本的 back-bar 有蓝色左边框 */
.back-bar.home-back {
  border-left: 4px solid var(--primary);
  background: linear-gradient(90deg, rgba(37,99,235,.06) 0%, var(--card) 60%);
}
.back-bar.home-back .back-title { color: var(--primary); }
.back-bar.home-back .back-arrow { color: var(--primary); }

/* ===== 首页本期要情卡片 ===== */
.home-report-card { border-top: 3px solid var(--primary); }

.tabs { display: flex; gap: 4px; padding: 10px 14px; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; position: sticky; top: 49px; z-index: 98; }
.tabs::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 7px 12px; border-radius: 16px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--bg); color: var(--text-secondary); white-space: nowrap; transition: all .2s; }
.tab-btn.active { background: var(--primary); color: #fff; }

.tab-content { display: none; padding: 14px 0; }
.tab-content.active { display: block; }

/* ========== CARDS ========== */
.card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.card-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

/* Ranking bars */
.rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
.rank-row:last-child { border-bottom: none; }
.rank-badge {
  width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; color: #fff;
}
.rank-badge.gold { background: #f59e0b; }
.rank-badge.silver { background: #94a3b8; }
.rank-badge.bronze { background: #cd7c3b; }
.rank-badge.normal { background: #d1d5db; color: var(--text-secondary); }
.rank-unit { flex: 1; font-weight: 600; font-size: 14px; }
.rank-score { font-weight: 700; font-size: 15px; }
.rank-delta { font-size: 11px; margin-left: 4px; }
.rank-delta.up { color: var(--success); }
.rank-delta.down { color: var(--danger); }

/* Progress bars */
.progress-bar { height: 6px; border-radius: 3px; background: #f3f4f6; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.progress-fill.high { background: var(--primary); }
.progress-fill.mid { background: var(--warning); }
.progress-fill.low { background: #e5e7eb; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-item { text-align: center; padding: 10px 6px; background: var(--bg); border-radius: var(--radius-sm); }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }

/* Tables */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: var(--bg); padding: 8px 6px; text-align: left; font-weight: 600; font-size: 11px; color: var(--text-secondary); border-bottom: 2px solid var(--border); }
.data-table td { padding: 8px 6px; border-bottom: 1px solid #f3f4f6; }
.data-table tr:last-child td { border-bottom: none; }

/* Insights */
.insight-box { background: #fffbeb; border-left: 4px solid var(--warning); padding: 12px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-bottom: 10px; font-size: 13px; }
.insight-box.danger { background: #fef2f2; border-left-color: var(--danger); }
.insight-box.info { background: #eff6ff; border-left-color: var(--primary); }
.insight-box.success { background: #f0fdf4; border-left-color: var(--success); }

/* Chart containers */
.chart-wrap { position: relative; height: 260px; margin: 8px 0; }
.chart-wrap.tall { height: 340px; }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.tag-up { background: #d1fae5; color: #065f46; }
.tag-down { background: #fef2f2; color: #991b1b; }
.tag-neutral { background: #f3f4f6; color: #4b5563; }

/* Summary block */
.summary-block { background: linear-gradient(135deg, #f8fafc, #f1f5f9); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.summary-block h3 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }

/* Section divider */
.section-divider {
  display: flex; align-items: center; gap: 10px; margin: 20px 0 14px; padding: 0 14px;
}
.section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-label { font-size: 13px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }

.color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; flex-shrink: 0; }

/* Footer */
.app-footer { text-align: center; padding: 24px 14px 32px; color: var(--text-muted); font-size: 11px; }
.app-footer a { color: var(--primary); text-decoration: none; }

.hidden { display: none !important; }

/* ===== 打印按钮 ===== */
.print-btn {
  flex-shrink: 0;
  font-size: 12px;
  color: #fff;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  padding: 5px 10px;
  border-radius: 14px;
  cursor: pointer;
  white-space: nowrap;
}
.print-btn:hover { background: rgba(255,255,255,0.28); }

/* ===== 打印预览弹层 ===== */
#print-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.55);
  z-index: 9000;
  overflow-y: auto;
  padding: 24px 16px;
}
#print-overlay.open { display: block; }
#print-frame {
  background: #fff;
  max-width: 880px;
  margin: 0 auto;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
.print-top-bar {
  background: #1e293b;
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.print-top-bar-left { opacity: .8; font-size: 12px; }
.print-top-bar-right { display: flex; gap: 8px; }
.print-action-btn {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.25);
  color: #fff;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}
.print-action-btn.primary { background: #2563eb; border-color: #2563eb; }
.print-action-btn:hover { opacity: .85; }
#print-doc-content { padding: 0; }

/* ===== 打印文档正文样式 ===== */
.pdoc {
  font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', 'Hiragino Sans GB', 'WenQuanYi Micro Hei', 'Noto Sans SC', sans-serif;
  color: #111;
  background: #fff;
  padding: 28px 36px 24px;
  font-size: 11pt;
  line-height: 1.7;
}
.pdoc-header {
  border-bottom: 2.5px solid #1a3a6b;
  padding-bottom: 12px;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.pdoc-org { font-size: 10pt; color: #555; letter-spacing: 1px; margin-bottom: 4px; }
.pdoc-title {
  font-size: 18pt;
  font-weight: 700;
  color: #1a3a6b;
  letter-spacing: 2px;
  line-height: 1.2;
}
.pdoc-meta {
  font-size: 9pt;
  color: #666;
  text-align: right;
  line-height: 1.8;
  flex-shrink: 0;
  margin-left: 16px;
}
.pdoc-body { display: flex; gap: 28px; }
.pdoc-col-main { flex: 1; min-width: 0; }
.pdoc-col-side { width: 186px; flex-shrink: 0; }

/* 数据汇总框 */
.pdoc-stats-row {
  display: flex; gap: 10px; margin-bottom: 14px;
}
.pdoc-stat-box {
  flex: 1; border: 1.5px solid #c8d6e8; border-radius: 6px;
  padding: 8px 6px; text-align: center; background: #f4f7fb;
}
.pdoc-stat-num { font-size: 15pt; font-weight: 700; color: #1a3a6b; line-height: 1.1; }
.pdoc-stat-label { font-size: 8pt; color: #666; margin-top: 2px; }

/* 情况报告段落 */
.pdoc-section { margin-bottom: 11px; }
.pdoc-section-title {
  font-size: 10.5pt;
  font-weight: 700;
  color: #1a3a6b;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
  border-left: 3px solid #1a56db;
  padding-left: 7px;
}
.pdoc-section-body {
  font-size: 10pt;
  color: #222;
  line-height: 1.8;
  padding-left: 10px;
}
.pdoc-section-empty { color: #aaa; font-style: italic; font-size: 9.5pt; padding-left: 10px; }

/* 侧栏排名 */
.pdoc-side-title {
  font-size: 10pt;
  font-weight: 700;
  color: #1a3a6b;
  border-bottom: 1.5px solid #1a3a6b;
  padding-bottom: 4px;
  margin-bottom: 8px;
}
.pdoc-rank-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; border-bottom: 1px dashed #ddd;
  font-size: 9.5pt;
}
.pdoc-rank-num {
  width: 18px; height: 18px; border-radius: 50%; background: #1a3a6b; color: #fff;
  font-size: 8pt; font-weight: 700; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pdoc-rank-num.r1 { background: #b8860b; }
.pdoc-rank-num.r2 { background: #666; }
.pdoc-rank-num.r3 { background: #7c4d2a; }
.pdoc-rank-unit { flex: 1; }
.pdoc-rank-score { font-weight: 700; color: #1a3a6b; white-space: nowrap; }

/* 侧栏累计排名 */
.pdoc-cum-row {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 0; font-size: 9pt;
}
.pdoc-cum-num { width: 16px; text-align: center; font-weight: 700; color: #555; font-size: 8.5pt; }

/* 底部：二维码 + 说明 */
.pdoc-footer {
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1.5px solid #1a3a6b;
  display: flex;
  align-items: center;
  gap: 20px;
}
.pdoc-qr-wrap { flex-shrink: 0; text-align: center; }
.pdoc-qr-img { width: 80px; height: 80px; border: 1.5px solid #ccc; border-radius: 4px; }
.pdoc-qr-label { font-size: 8pt; color: #666; margin-top: 4px; }
.pdoc-footer-text {
  flex: 1; font-size: 9pt; color: #444; line-height: 1.7;
}
.pdoc-footer-disclaimer {
  font-size: 8pt; color: #999; margin-top: 8px;
}
.pdoc-cum-section { margin-top: 14px; }

/* ===== 手机端响应式 ===== */
@media (max-width: 640px) {
  .hub {
    grid-template-columns: 1fr;
    padding: 10px 12px;
    gap: 8px;
  }
  .hub-card {
    padding: 12px 14px;
    gap: 10px;
  }
  .hub-icon { width: 36px; height: 36px; font-size: 18px; border-radius: 8px; }
  .hub-label { font-size: 13px; }
  .hub-desc { font-size: 10px; }

  .header-title { font-size: 15px; }
  .header-subtitle { font-size: 10px; }

  body { overflow-x: hidden; }

  .weeks-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .month-grid, .quarter-grid { grid-template-columns: 1fr; }

  .stat-grid { grid-template-columns: repeat(2, 1fr); }

  .pdoc-body { flex-direction: column; }
  .pdoc-col-side { max-width: 100%; overflow-x: hidden; }
  .pdoc { max-width: 100vw; overflow-x: hidden; }
}

@media (max-width: 480px) {
  .hub { padding: 8px 10px; gap: 6px; }
  .hub-card { padding: 10px 12px; gap: 8px; }
  .weeks-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
}

/* ===== @media print ===== */
@media print {
  * { font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif !important; }
  #print-overlay { display: block !important; position: static; background: none; padding: 0; overflow: visible; }
  #print-frame { box-shadow: none; border-radius: 0; max-width: none; }
  .print-top-bar { display: none; }
  body > * { display: none !important; }
  #print-overlay { display: block !important; }
  #print-overlay * { display: revert; }
  @page { size: A4 landscape; margin: 8mm 10mm; }
}

/* 黑白打印优化 */
@media print and (color-index: 0) {
  .pdoc-section-title { color: #000 !important; border-left-color: #000 !important; }
  .pdoc-rank-num { background: #333 !important; }
  .pdoc-stat-box { background: #f0f0f0 !important; border-color: #888 !important; }

<script>

// 尝试从 data.json 刷新数据（用于 WPS 同步按钮）

// ===== 兼容函数 =====
// Week labels
function weekLabel(w) { return '第'+w+'周'; }

// Get all scores for a unit across all weeks
function getAllWeeks(unit) {
  var q1 = Q1_WEEKS[unit] || [];
  var q2 = Q2_WEEKS[unit] || [];
  return q1.concat(q2);
}

// Get score for a specific week
function getWeekScore(unit, week) {
  if (week <= 13) return (Q1_WEEKS[unit]||[])[week-1] || 0;
  return (Q2_WEEKS[unit]||[])[week-14] || 0;
}

// Total weeks count
var TOTAL_WEEKS = 22;

// ═══ 权威累计总分（来源：金山文档·总体得分汇总自动 s22，含定性加分/定量扣分/指标修正/舆情扣分）═══
var AUTH_TOTALS = {
  "本部": 42.1,
  "东台": 40.35,
  "大丰": 52.0,
  "建湖": 35.1,
  "射阳": 22.2,
  "阜宁": 16.7,
  "滨海": 27.7,
  "响水": 19.25
};

// Check if a week has actual data (any unit with non-zero score)
function weekHasData(w) {
  for (var i = 0; i < UNITS.length; i++) {
    if (getWeekScore(UNITS[i], w) !== 0) return true;
  }
  return false;
}

// Find the latest week number that has actual data
function latestWeekWithData() {
  for (var w = TOTAL_WEEKS; w >= 1; w--) {
    if (weekHasData(w)) return w;
  }
  return TOTAL_WEEKS;
}

// Q1 weeks 1-13, Q2 weeks 14-22
function getQuarter(week) { return week <= 13 ? 'Q1' : 'Q2'; }
function getMonth(week) {
  if (week <= 4) return 1;
  if (week <= 8) return 2;
  if (week <= 13) return 3;
  if (week <= 17) return 4;
  return 5;
}

function getWeeksInMonth(m) {
  if (m === 1) return [1,2,3,4];
  if (m === 2) return [5,6,7,8];
  if (m === 3) return [9,10,11,12,13];
  if (m === 4) return [14,15,16,17];
  return [18,19,20,21,22];
}

function getWeeksInQuarter(q) {
  if (q === 'Q1') { var a=[]; for (var i=1;i<=13;i++) a.push(i); return a; }
  var a=[]; for (var i=14;i<=TOTAL_WEEKS;i++) a.push(i); return a;
}

// Compute total score for a unit up to a given week
function totalScore(unit, upToWeek) {
  var sum = 0;
  for (var w = 1; w <= upToWeek; w++) sum += getWeekScore(unit, w);
  return Math.round(sum * 100) / 100;
}

// Build ranking array for a set of weeks
function rankUnits(weeks) {
  return UNITS.map(function(u) {
    var sum = 0;
    weeks.forEach(function(w) { sum += getWeekScore(u, w); });
    return { unit: u, score: Math.round(sum*100)/100 };
  }).sort(function(a,b) { return b.score - a.score; });
}

// Get unit's total cumulative score (authoritative from 总体得分汇总·自动)
function cumulativeTotal(unit) {
  return AUTH_TOTALS[unit] || totalScore(unit, TOTAL_WEEKS);
}

function getTopUnit(weeks) {
  var r = rankUnits(weeks);
  return r[0];
}

function getRankForUnit(unit, weeks) {
  var r = rankUnits(weeks);
  for (var i = 0; i < r.length; i++) {
    if (r[i].unit === unit) return i + 1;
  }
  return '-';
}

// Previous rank (for delta)
function getPrevRankForUnit(unit, week) {
  if (week <= 1) return '-';
  return getRankForUnit(unit, [week - 1]);
}

// Week date range (approximate)
function weekDateRange(week) {
  if (week <= 13) {
    var start = new Date(2026, 0, 5 + (week-1)*7);
    var end = new Date(start); end.setDate(end.getDate() + 6);
    return formatDate(start) + ' - ' + formatDate(end);
  }
  var start = new Date(2026, 3, 6 + (week-14)*7);
  var end = new Date(start); end.setDate(end.getDate() + 6);
  return formatDate(start) + ' - ' + formatDate(end);
}

function formatDate(d) {
  return (d.getMonth()+1) + '/' + d.getDate();
}

// Month labels
var MONTH_NAMES = {1:'一月',2:'二月',3:'三月',4:'四月',5:'五月'};
var MONTH_WEEKS_LABEL = {1:'第1-4周',2:'第5-8周',3:'第9-13周',4:'第14-17周',5:'第18-22周'};

    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveReportData(week, data) {

    localStorage.setItem(REPORT_KEY_PREFIX + week, JSON.stringify(data));
  } catch(e) {}
}

// Build the report card HTML (view mode or edit mode)
function buildReportCard(week) {
  var data = getReportData(week);
  var dateRange = weekDateRange(week);
  var hasContent = REPORT_FIELDS.some(function(f) { return data[f.key] && data[f.key].trim(); });
  var html = '';
  html += '<div class="report-card" id="report-card-' + week + '">';
  html += '<div class="report-header">';

  html += '<div class="report-body" id="report-view-' + week + '">';
  if (!hasContent) {
    html += '<div class="report-empty-tip"><div class="tip-icon">📝</div>';
    html += '<div>本周情况报告尚未填写</div>';
    html += '<div style="margin-top:6px;font-size:12px;">点击右上角「编辑报告」填写本周情况摘要，供领导查阅</div></div>';
  } else {
    REPORT_FIELDS.forEach(function(f) {
      var txt = data[f.key] ? data[f.key].trim() : '';
      if (!txt) return;
      html += '<div class="report-section">';
      html += '<div class="report-section-title ' + f.colorClass + '">' + f.icon + ' ' + f.title + '</div>';
      html += '<div class="report-text">' + escapeHtml(txt).replace(/\n/g, '<br>') + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';

  // Edit body (hidden by default)
  html += '<div id="report-edit-' + week + '" style="display:none;">';
  html += '<div class="report-body">';
  REPORT_FIELDS.forEach(function(f) {
    var val = data[f.key] || '';
    html += '<div class="report-section">';
    html += '<div class="report-section-title ' + f.colorClass + '">' + f.icon + ' ' + f.title + '</div>';
    html += '<textarea class="report-edit-area" id="report-field-' + week + '-' + f.key + '" placeholder="' + f.placeholder + '" rows="3">' + escapeHtml(val) + '</textarea>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="report-actions">';
  html += '<button class="btn-cancel" onclick="cancelReportEdit(' + week + ')">取消</button>';
  html += '<button class="btn-save" onclick="saveReport(' + week + ')">💾 保存报告</button>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // .report-card
  return html;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function enterReportEdit(week) {
  document.getElementById('report-view-' + week).style.display = 'none';
  document.getElementById('report-edit-' + week).style.display = 'block';
  // Fix: find the edit button inside report-card and hide it
  var card = document.getElementById('report-card-' + week);
  if (card) {
    var btn = card.querySelector('.report-edit-btn');
    if (btn) btn.style.display = 'none';
  }
}

function cancelReportEdit(week) {
  document.getElementById('report-view-' + week).style.display = 'block';
  document.getElementById('report-edit-' + week).style.display = 'none';
  var card = document.getElementById('report-card-' + week);
  if (card) {
    var btn = card.querySelector('.report-edit-btn');
    if (btn) btn.style.display = '';
  }
}

function saveReport(week) {
  var data = {};
  REPORT_FIELDS.forEach(function(f) {
    var el = document.getElementById('report-field-' + week + '-' + f.key);
    data[f.key] = el ? el.value : '';
  });
  saveReportData(week, data);
  // Re-render the view area without re-rendering whole tab
  var viewEl = document.getElementById('report-view-' + week);
  var hasContent = REPORT_FIELDS.some(function(f) { return data[f.key] && data[f.key].trim(); });
  var innerHtml = '';
  if (!hasContent) {
    innerHtml += '<div class="report-empty-tip"><div class="tip-icon">📝</div>';
    innerHtml += '<div>本周情况报告尚未填写</div>';

  } else {
    REPORT_FIELDS.forEach(function(f) {
      var txt = data[f.key] ? data[f.key].trim() : '';
      if (!txt) return;
      innerHtml += '<div class="report-section">';
      innerHtml += '<div class="report-section-title ' + f.colorClass + '">' + f.icon + ' ' + f.title + '</div>';
      innerHtml += '<div class="report-text">' + escapeHtml(txt).replace(/\n/g, '<br>') + '</div>';
      innerHtml += '</div>';
    });
  }
  viewEl.innerHTML = innerHtml;
  cancelReportEdit(week);
}

  // ===== TAB 0: 总览排名 =====
  html += '<div class="tab-content' + (currentTab === 0 ? ' active' : '') + '" id="tab-0">';

function switchTab(idx) {

function renderDetailCharts() {
  var w = currentWeek;
  var hasData = weekHasData(w);

  // ---- TAB 1: Trend chart ----
  var ctxTrend = document.getElementById('chart-trend');
  if (ctxTrend) {
    var startWeek = Math.max(1, w - 9);
    var labels = [];
    for (var i = startWeek; i <= w; i++) labels.push('第'+i+'周');

    var colors = ['#1a56db','#0e9f6e','#e3a008','#e02424','#8b5cf6','#ec4899','#06b6d4','#f97316'];
    var datasets = UNITS.map(function(u, i) {
      var data = [];
      for (var j = startWeek; j <= w; j++) data.push(getWeekScore(u, j));
      return {
        label: u, data: data, borderColor: colors[i], backgroundColor: 'transparent',
        tension: 0.3, borderWidth: 2, pointRadius: 3, pointHoverRadius: 5
      };
    });

    new Chart(ctxTrend, {
      type: 'line', data: { labels: labels, datasets: datasets },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 8, font: { size: 10 } } } },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // ---- TAB 1: Bar chart ----
  var ctxBar = document.getElementById('chart-bar');

    var scores = UNITS.map(function(u) { return getWeekScore(u, w); });

      if (s === Math.max.apply(null, scores)) return 'rgba(245,158,11,.7)';

    html += '<div class="rank-row"><span class="rank-badge ' + badgeClass + '">' + (i+1) + '</span>';

  // Weekly breakdown
  html += '<div class="card"><div class="card-title">📋 各周明细</div>';

    var ctxQ = document.getElementById('chart-quarter-detail');

        var s = 0; weeks.forEach(function(ww) { s += getWeekScore(u, ww); }); return s;

        type: 'bar', data: { labels: UNITS, datasets: [{ label: q+'总分', data: qData, backgroundColor: 'rgba(14,159,110,.6)', borderRadius: 6 }] },

      new Chart(ctxCmp, {

function showUnitDetail(unit) {
  selectedUnit = unit;
  var v = document.getElementById('main-view');
  var allWeeks = getAllWeeks(unit);
  var cumTotal = cumulativeTotal(unit);

  var html = '';
  html += '<div class="back-bar" onclick="showUnitPicker()" style="padding-right:8px;">';
  html += '<span class="back-arrow">←</span>';
  html += '<div style="flex:1"><span class="back-title">' + unit + ' · 单位数据看板</span>';
  html += '<div class="back-sub">' + (UNIT_FULL[unit] || unit) + ' &nbsp;·&nbsp; 返回单位列表</div></div>';
  html += '<button onclick="event.stopPropagation();showHub()" style="flex-shrink:0;font-size:12px;color:var(--primary);background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);padding:5px 10px;border-radius:14px;cursor:pointer;">🏠 首页</button>';
  html += '</div><div class="content">';

  // Stats
  var q1Total = 0, q2Total = 0;
  for (var i = 1; i <= 13; i++) q1Total += getWeekScore(unit, i);
  for (var i = 14; i <= TOTAL_WEEKS; i++) q2Total += getWeekScore(unit, i);
  var bestWeek = 0, bestScore = 0;
  for (var i = 1; i <= TOTAL_WEEKS; i++) {
    var s = getWeekScore(unit, i);
    if (s > bestScore) { bestScore = s; bestWeek = i; }
  }
  var activeWeeks = allWeeks.filter(function(s) { return s > 0; }).length;

  html += '<div class="stat-grid">';
  html += '<div class="stat-item"><div class="stat-val">' + cumTotal + '</div><div class="stat-label">累计总分</div></div>';
  html += '<div class="stat-item"><div class="stat-val">' + activeWeeks + '/' + TOTAL_WEEKS + '</div><div class="stat-label">活跃周次</div></div>';
  html += '<div class="stat-item"><div class="stat-val">' + bestScore + '</div><div class="stat-label">单周最高(' + (bestWeek ? '第'+bestWeek+'周' : '-') + ')</div></div>';
  html += '</div>';

  // Cumulative rank position
  var cumRank = rankUnits(getWeeksInQuarter('Q1').concat(getWeeksInQuarter('Q2')));
  var unitRank = cumRank.findIndex(function(r) { return r.unit === unit; }) + 1;

  html += '<div class="card"><div class="card-title">🏆 累计排名：第 ' + unitRank + ' 名</div>';
  html += '<div class="stat-grid">';
  html += '<div class="stat-item"><div class="stat-val" style="color:var(--primary)">' + Math.round(q1Total*100)/100 + '</div><div class="stat-label">Q1得分</div></div>';
  html += '<div class="stat-item"><div class="stat-val" style="color:var(--success)">' + Math.round(q2Total*100)/100 + '</div><div class="stat-label">Q2得分</div></div>';
  html += '<div class="stat-item"><div class="stat-val">' + Math.round(cumTotal/(TOTAL_WEEKS)*100)/100 + '</div><div class="stat-label">周均得分</div></div>';
  html += '</div></div>';

  // Trend chart
  html += '<div class="card"><div class="card-title">📈 全周期得分走势</div>';
  html += '<div class="chart-wrap"><canvas id="chart-unit-trend"></canvas></div></div>';

  // Week-by-week table
  html += '<div class="card"><div class="card-title">📋 逐周明细</div>';
  html += '<table class="data-table"><thead><tr><th>周次</th><th>日期</th><th>得分</th><th>当周排名</th><th>累计得分</th></tr></thead><tbody>';
  var runningTotal = 0;
  for (var i = 1; i <= TOTAL_WEEKS; i++) {
    var s = getWeekScore(unit, i);
    runningTotal += s;
    var wr = getRankForUnit(unit, [i]);
    var hasData = weekHasData(i);
    html += '<tr>';
    html += '<td><strong>第' + i + '周</strong></td>';
    html += '<td>' + weekDateRange(i) + '</td>';
    html += '<td>' + (hasData ? s : '<span style="color:var(--text-muted)">—</span>') + '</td>';
    html += '<td>' + (hasData ? wr : '<span style="color:var(--text-muted)">—</span>') + '</td>';
    html += '<td>' + Math.round(runningTotal*100)/100 + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // Month summary
  html += '<div class="card"><div class="card-title">📆 月度汇总</div>';
  html += '<table class="data-table"><thead><tr><th>月份</th><th>周次</th><th>月得分</th><th>月排名</th></tr></thead><tbody>';
  for (var m = 1; m <= 5; m++) {
    var mWeeks = getWeeksInMonth(m);
    var mScore = 0;
    mWeeks.forEach(function(ww) { mScore += getWeekScore(unit, ww); });
    mScore = Math.round(mScore * 100) / 100;
    var mRank = getRankForUnit(unit, mWeeks);
    html += '<tr><td><strong>' + MONTH_NAMES[m] + '</strong></td><td>' + MONTH_WEEKS_LABEL[m] + '</td><td>' + mScore + '</td><td>' + mRank + '</td></tr>';
  }
  html += '</tbody></table></div>';

  html += '</div>';
  v.innerHTML = html;

  setTimeout(function() {
    var ctx = document.getElementById('chart-unit-trend');
    if (ctx) {
      var labels = [];
      for (var i = 1; i <= TOTAL_WEEKS; i++) labels.push(i + '');
      new Chart(ctx, {
        type: 'line', data: { labels: labels, datasets: [{
          label: unit + ' 每周得分', data: allWeeks,
          borderColor: '#1a56db', backgroundColor: 'rgba(26,86,219,.1)',
          fill: true, tension: 0.3, borderWidth: 2, pointRadius: 3
        }]},
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true }, x: { title: { display: true, text: '周次' } } }
        }
      });
    }
  }, 100);
}

// 二维码 Base64（内嵌，无需网络）-- 在首次需要时用 API 生成
var _qrBase64 = null;

// 用 qrcodejs 生成 Base64（纯 JS 实现，无依赖）
function getQRBase64(url, callback) {
  if (_qrBase64) { callback(_qrBase64); return; }
  // 简单 QR 占位：使用在线服务生成（如果可访问），否则显示文字
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
    _qrBase64 = canvas.toDataURL('image/png');
    callback(_qrBase64);
  };
  img.onerror = function() { callback(null); };
  // 使用国内可访问的二维码API
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
}

function openPrintOverlay(week) {
  var overlay = document.getElementById('print-overlay');
  var docContent = document.getElementById('print-doc-content');
  if (!overlay || !docContent) return;

  // 先渲染占位，等待二维码
  docContent.innerHTML = buildPrintDoc(week, null);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // 异步加载二维码
  var dashboardUrl = window.location.hostname
    ? (window.location.origin + window.location.pathname)
    : 'https://zhuyuan643406343.github.io/yancheng-power-dashboard/';
  getQRBase64(dashboardUrl, function(b64) {
    docContent.innerHTML = buildPrintDoc(week, b64);
  });
}

function closePrintOverlay() {
  var overlay = document.getElementById('print-overlay');
  if (overlay) { overlay.classList.remove('open'); }
  document.body.style.overflow = '';
}

function triggerPrint() {
  window.print();
}





function buildPrintDoc(week, qrB64) {
  var rptData = getReportData(week);
  var dateRange = weekDateRange(week);
  var today = new Date();
  var printDate = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';

  // --- 周排名数据 ---
  var weekRank = rankUnits([week]);
  var hasData = weekRank.some(function(r) { return r.score > 0; });
  var totalWeekScore = 0;
  weekRank.forEach(function(r) { totalWeekScore += r.score; });
  var activeUnits = weekRank.filter(function(r) { return r.score > 0; }).length;
  var maxScore = weekRank.length > 0 ? weekRank[0].score : 0;

  // --- 累计排名 ---
  var cumList = UNITS.map(function(u) { return { unit: u, score: totalScore(u, week) }; })
    .sort(function(a,b) { return b.score - a.score; });

  var html = '<div class="pdoc">';

  // ---- 页眉 ----
  html += '<div class="pdoc-header">';
  html += '<div>';
  html += '<div class="pdoc-org">国网盐城供电公司党委宣传部（宣传）</div>';
  html += '<div class="pdoc-title">宣传工作情况周报</div>';
  html += '<div style="font-size:10pt;color:#555;margin-top:4px;letter-spacing:1px;">第' + week + '周 &nbsp;|&nbsp; ' + dateRange + '</div>';
  html += '</div>';
  html += '<div class="pdoc-meta">';
  html += '打印日期：' + printDate + '<br>';
  html += '报告期：第' + week + '周<br>';
  html += '编制：党委宣传部';
  html += '</div>';
  html += '</div>';

  // ---- 数据统计行 ----
  if (hasData) {
    html += '<div class="pdoc-stats-row">';
    html += '<div class="pdoc-stat-box"><div class="pdoc-stat-num">' + Math.round(totalWeekScore*10)/10 + '</div><div class="pdoc-stat-label">本周总分</div></div>';
    html += '<div class="pdoc-stat-box"><div class="pdoc-stat-num">' + activeUnits + '/' + UNITS.length + '</div><div class="pdoc-stat-label">有效单位</div></div>';
    html += '<div class="pdoc-stat-box"><div class="pdoc-stat-num">' + maxScore + '</div><div class="pdoc-stat-label">最高单篇分</div></div>';
    // 累计第1名
    html += '<div class="pdoc-stat-box"><div class="pdoc-stat-num" style="font-size:11pt;">' + (cumList[0] ? cumList[0].unit : '-') + '</div><div class="pdoc-stat-label">累计第一</div></div>';
    html += '</div>';
  }

  // ---- 主体两栏 ----
  html += '<div class="pdoc-body">';

  // 左栏：情况报告
  html += '<div class="pdoc-col-main">';
  var reportSections = [
    { key: 'overview',  icon: '▶', title: '一、整体情况' },
    { key: 'highlight', icon: '▶', title: '二、本周亮点' },
    { key: 'yuqing',    icon: '▶', title: '三、舆情提示' },
    { key: 'attention', icon: '▶', title: '四、需关注事项' },
    { key: 'plan',      icon: '▶', title: '五、下周策划方向' }
  ];
  var anyContent = reportSections.some(function(s) { return rptData[s.key] && rptData[s.key].trim(); });
  if (!anyContent) {
    html += '<div style="color:#999;font-style:italic;font-size:10pt;padding:12px 0;">（本周情况报告内容未填写，请在看板「本期要情」Tab 中编辑并保存后重新打印）</div>';
  } else {
    reportSections.forEach(function(s) {
      var txt = rptData[s.key] ? rptData[s.key].trim() : '';
      html += '<div class="pdoc-section">';
      html += '<div class="pdoc-section-title">' + s.icon + ' ' + s.title + '</div>';
      if (txt) {
        html += '<div class="pdoc-section-body">' + escapeHtml(txt).replace(/\n/g, '<br>') + '</div>';
      } else {
        html += '<div class="pdoc-section-empty">（暂无内容）</div>';
      }
      html += '</div>';
    });
  }
  html += '</div>';

  // 右栏：排名数据
  html += '<div class="pdoc-col-side">';

  if (hasData) {
    // 本周排名
    html += '<div class="pdoc-side-title">本周综合排名</div>';
    weekRank.forEach(function(r, i) {
      var numClass = i === 0 ? 'r1' : (i === 1 ? 'r2' : (i === 2 ? 'r3' : ''));
      html += '<div class="pdoc-rank-row">';
      html += '<div class="pdoc-rank-num ' + numClass + '">' + (i+1) + '</div>';
      html += '<span class="pdoc-rank-unit">' + r.unit + '</span>';
      html += '<span class="pdoc-rank-score">' + r.score + '分</span>';
      html += '</div>';
    });
  } else {
    html += '<div class="pdoc-side-title">本周综合排名</div>';
    html += '<div style="font-size:9pt;color:#999;padding:8px 0;">数据待录入</div>';
  }

  // 累计排名
  html += '<div class="pdoc-cum-section">';
  html += '<div class="pdoc-side-title" style="margin-top:10px;">截至本周累计排名</div>';
  cumList.forEach(function(r, i) {
    html += '<div class="pdoc-cum-row">';
    html += '<div class="pdoc-cum-num">' + (i+1) + '</div>';
    html += '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + r.unit + '</span>';
    html += '<span style="font-weight:700;font-size:9pt;color:#1a3a6b;">' + r.score + '</span>';
    html += '</div>';
  });
  html += '</div>';

  html += '</div>'; // .pdoc-col-side
  html += '</div>'; // .pdoc-body

  // ---- 底部：二维码 + 说明 ----
  html += '<div class="pdoc-footer">';
  html += '<div class="pdoc-qr-wrap">';
  if (qrB64) {
    html += '<img class="pdoc-qr-img" src="' + qrB64 + '" alt="看板二维码">';
  } else {
    html += '<div style="width:80px;height:80px;border:1.5px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8pt;color:#999;text-align:center;">扫码<br>查看看板</div>';
  }
  html += '<div class="pdoc-qr-label">扫码查看<br>全量数据</div>';
  html += '</div>';
  html += '<div class="pdoc-footer-text">';
  html += '<strong>关于本报告：</strong>本报告由"盐城供电宣传工作周报看板"系统自动生成，数据来源于金山文档多维表格，经党委宣传部宣传岗汇总整理。报告中的情况说明部分为人工编写。如有疑问，请联系党委宣传部。<br>';
  html += '<div class="pdoc-footer-disclaimer">注：本报告内容属内部参阅资料，请妥善保管。扫描右侧二维码可在线查看详细数据看板（需在有网络的设备上访问）。</div>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // .pdoc
  return html;
}
</script>
